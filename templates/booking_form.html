<!DOCTYPE html>
<html>
<head>
    <title>Book Tutor</title>
</head>
<body>

    <h2>Book a Tutor</h2>

    <form action="/book_tutor" method="POST">

        <label>Student Name</label><br>
        <input type="text" name="name" required><br><br>

        <label>Email</label><br>
        <input type="email" name="email" required><br><br>

        <label>Phone Number</label><br>
        <input type="text" name="phone"><br><br>

        <label>Subject Needed</label><br>
        <input type="text" name="subject"><br><br>

        <label>Class/Grade</label><br>
        <input type="text" name="grade"><br><br>

        <label>Preferred Date</label><br>
        <input type="date" name="date"><br><br>

        <label>Preferred Time</label><br>
        <input type="time" name="time"><br><br>

        <label>Additional Notes</label><br>
        <textarea name="message"></textarea><br><br>

        <button type="submit">Book Now</button>

    </form>

</body>
</html>
