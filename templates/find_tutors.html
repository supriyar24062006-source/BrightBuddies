<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Tutors - BrightBuddies</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    margin: 0;
    padding: 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #2b6cb0;
}

/* GRID */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    width: 260px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    margin-bottom: 10px;
    color: #333;
}

.card p {
    margin: 5px 0;
    color: #666;
}

button {
    margin-top: 10px;
    padding: 8px 14px;
    border: none;
    background: #2b6cb0;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1e4f86;
}
</style>

</head>

<body>

<h2>Available Tutors (Class 1 – Degree)</h2>

<div class="container">

    {% for tutor in tutors %}
    <div class="card">
        <h3>{{ tutor.name }}</h3>
        <p>{{ tutor.subject }}</p>
        <p>⭐ {{ tutor.rating }}</p>
        <button>Book Now</button>
    </div>
    {% endfor %}

</div>

</body>
</html>
