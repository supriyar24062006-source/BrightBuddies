<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Tutors - BrightBuddies</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    margin: 0;
    padding: 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #2b6cb0;
}

/* GRID */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    width: 260px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}

.card h3 {
    margin-bottom: 10px;
    color: #333;
}

.card p {
    margin: 5px 0;
    color: #666;
}

.book-btn {
    margin-top: 10px;
    padding: 10px 14px;
    border: none;
    background: #2b6cb0;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    width: 100%;
    transition: 0.2s;
}

.book-btn:hover {
    background: #1e4f86;
    transform: scale(1.02);
}

/* BOOKING MODAL */
#bookingModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

#bookingModal.active {
    display: flex;
}

.modal-content {
    background: white;
    padding: 24px;
    width: 90%;
    max-width: 400px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
}

.modal-content h3 {
    margin-top: 0;
    margin-bottom: 16px;
    color: #2b6cb0;
    font-size: 20px;
}

.booking-form-group {
    margin-bottom: 12px;
}

.booking-form-group label {
    display: block;
    margin-bottom: 4px;
    font-weight: 600;
    color: #333;
    font-size: 14px;
}

.booking-form-group input,
.booking-form-group textarea {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
}

.booking-form-group input:focus,
.booking-form-group textarea:focus {
    border-color: #2b6cb0;
    outline: none;
}

.booking-form-group textarea {
    resize: vertical;
    min-height: 60px;
}

.booking-buttons {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 16px;
}

.booking-buttons button {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

#bookingCancel {
    background: #e0e0e0;
    color: #333;
}

#bookingCancel:hover {
    background: #d0d0d0;
}

</style>

</head>

<body>

<h2>Available Tutors (Class 1 – Degree)</h2>

<div class="container">

    {% for tutor in tutors %}
    <div class="card">
        <h3>{{ tutor.name }}</h3>
        <p>{{ tutor.subject }}</p>
        <p>⭐ {{ tutor.rating }}</p>
        <button class="book-btn">Book Now</button>
    </div>
    {% endfor %}

</div>

<!-- BOOKING MODAL -->
<div id="bookingModal">
    <div class="modal-content">
        <h3>Book Tutor</h3>
        <form id="bookingForm" action="/book_tutor" method="post">
            <input type="hidden" name="tutor" id="bookingTutor">
            <div class="booking-form-group">
                <label>Your name</label>
                <input type="text" name="name" required />
            </div>
            <div class="booking-form-group">
                <label>Email</label>
                <input type="email" name="email" required />
            </div>
            <div class="booking-form-group">
                <label>Phone</label>
                <input type="tel" name="phone" />
            </div>
            <div class="booking-form-group">
                <label>Preferred date</label>
                <input type="date" name="date" />
            </div>
            <div class="booking-form-group">
                <label>Message</label>
                <textarea name="message"></textarea>
            </div>
            <div class="booking-buttons">
                <button type="button" id="bookingCancel">Cancel</button>
                <button type="submit" style="width: auto; background: #2b6cb0; color: white;">Confirm</button>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
