<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration - BrightBuddies</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }
        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
        h2{
            text-align:center;
            color:#2196F3;
        }
        input, select{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }
        button{
            width:100%;
            padding:10px;
            background:#2196F3;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        button:hover{
            background:#1976D2;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Registration</h2>

    <form action="/register_student" method="POST">

        <input type="text" name="name" placeholder="Full Name" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="text" name="phone" placeholder="Phone Number" required>

        <input type="text" name="grade" placeholder="Class / Grade" required>

        <input type="text" name="subject" placeholder="Subject Needed" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register as Student</button>

    </form>
</div>

</body>
</html>
