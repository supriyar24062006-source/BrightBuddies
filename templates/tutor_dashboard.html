 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='tutor_dashboardstyle.css') }}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <h1 class="logo">BrightBuddies</h1>

        <ul class="nav-links">
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Students</a></li>
            <li><a href="#">Classes</a></li>
            <li><a href="#">Logout</a></li>
        </ul>
    </nav>

    <!-- Dashboard Heading -->
    <section class="dashboard-header">
        <h2>Welcome, Tutor 👋</h2>
        <p>Manage your students, classes, and earnings here.</p>
    </section>

    <!-- Dashboard Cards -->
    <section class="dashboard-cards">

        <div class="dashboard-card">
            <h3>Total Students</h3>
            <p>25</p>
        </div>

        <div class="dashboard-card">
            <h3>Upcoming Classes</h3>
            <p>8</p>
        </div>

        <div class="dashboard-card">
            <h3>Total Earnings</h3>
            <p>₹12,500</p>
        </div>

    </section>

    <!-- Class Schedule -->
    <section class="schedule-section">

        <h2>Today's Classes</h2>

        <table>
            <tr>
                <th>Student</th>
                <th>Subject</th>
                <th>Time</th>
            </tr>

            <tr>
                <td>Ananya</td>
                <td>Mathematics</td>
                <td>4:00 PM</td>
            </tr>

            <tr>
                <td>Rohan</td>
                <td>Science</td>
                <td>6:00 PM</td>
            </tr>
        </table>

    </section>

</body>
</html>
